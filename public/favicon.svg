<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="#0bd2b5"/>
  <!-- Globe outline -->
  <circle cx="24" cy="24" r="13" fill="none" stroke="#050505" stroke-width="2.2"/>
  <!-- Equator -->
  <ellipse cx="24" cy="24" rx="7" ry="13" fill="none" stroke="#050505" stroke-width="2.2"/>
  <!-- Horizontal latitude lines -->
  <line x1="11" y1="19" x2="37" y2="19" stroke="#050505" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="29" x2="37" y2="29" stroke="#050505" stroke-width="2" stroke-linecap="round"/>
</svg>
